name: Windows verification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up the native .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x
      - name: Build the native Mute Cue projects
        shell: powershell
        run: dotnet build .\src\MuteCue.Desktop.Tests\MuteCue.Desktop.Tests.csproj --configuration Release --nologo -p:MuteCueChannel=Stable
      - name: Test the Stable native runtime
        shell: powershell
        run: dotnet run --project .\src\MuteCue.Desktop.Tests\MuteCue.Desktop.Tests.csproj --configuration Release --no-build --nologo -p:MuteCueChannel=Stable
      - name: Run the full Mute Cue test suite
        shell: powershell
        run: .\Overlay\Tests\Run-All.ps1
