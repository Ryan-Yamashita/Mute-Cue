name: Feature request
description: Suggest an improvement to Mute Cue.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Describe what you expect to see or do in the app.
    validations:
      required: true
